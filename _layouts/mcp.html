---
layout: default
---
<div class="meta">{{ page.date | date: "%B %d, %Y" }}</div>
<h1>{{ page.title }}</h1>
<div class="registry-meta">
  {% if page.repo %}<div class="registry-row"><span class="registry-key">Repo</span> <a href="{{ page.repo }}">{{ page.repo }}</a></div>{% endif %}
  {% if page.install %}<div class="registry-row"><span class="registry-key">Install</span> <code>{{ page.install }}</code></div>{% endif %}
  {% if page.tools %}<div class="registry-row"><span class="registry-key">Tools</span> {{ page.tools | join: ", " }}</div>{% endif %}
</div>
<div class="content">
  {{ content }}
</div>
