---
layout: default
permalink: /tags/mcp/
---
<h1>MCP</h1>
<ul class="post-list">
  {% for post in site.tags.mcp %}
  <li>
    <span class="date">{{ post.date | date: "%B %d, %Y" }}</span><br />
    <a href="{{ post.url }}">{{ post.title }}</a>
    {% if post.description %}<br /><span class="date">{{ post.description }}</span>{% endif %}
  </li>
  {% endfor %}
</ul>
